# Sveltia CMS configuration.
# Mirrors the Astro content schema (src/content.config.ts). The Markdown/YAML in
# src/content/** is the source of truth; this is just the editing layer.
# Add collections (post, article, page, publication) here as those are built.

backend:
  name: github
  repo: SHartman/skeletaldrawing
  branch: main
  # Auth = GitHub personal access token via Sveltia's "Sign In with Token" button.
  # No OAuth app / Worker needed (Sveltia's recommended method for a solo editor).
  # Switch to PKCE login if/when GitHub ships it.

# Uploaded images land here and are served as-is. For build-optimized images,
# use the local watermark → commit flow (which also writes src/assets/skeletals/).
media_folder: "public/images/skeletals"
public_folder: "/images/skeletals"

collections:
  - name: taxa
    label: "Taxa — skeletal pages"
    label_singular: "Taxon"
    folder: "src/content/taxa"
    create: true
    extension: md
    format: frontmatter
    identifier_field: taxon
    slug: "{{slug}}"
    summary: "{{taxon}}"
    fields:
      - { name: taxon, label: "Taxon (binomial)", widget: string, hint: "Rendered italic, e.g. Diplodocus carnegii" }
      - { name: author, label: "Author (name citation)", widget: string, hint: "Who named the species, and when — name and year only, NO parentheses (e.g. Hatcher, 1901). Use the Recombination toggle below for parentheses." }
      - { name: commonName, label: "Common name", widget: string, required: false, hint: "Popular/vernacular name — especially for extant taxa (e.g. Northern Cardinal, Platypus, Muskox). Shown under the binomial and made searchable. Leave blank if there isn't one." }
      - { name: recombination, label: "Recombination — wrap author in parentheses", widget: boolean, default: false, required: false, hint: "Tick if the species was originally described in a DIFFERENT genus (ICZN: the author citation then takes parentheses, e.g. Diplodocus hallorum (Gillette, 1991))." }
      - { name: gallery, label: "Gallery", widget: string, default: "sauropods-and-kin", hint: "URL section / gallery bucket" }
      - name: clade
        label: "Clade path (broad → specific)"
        widget: list
        field: { name: node, label: "Clade", widget: string }
        hint: "Ordered, e.g. Sauropodomorpha, Sauropoda, Diplodocoidea, Diplodocidae"
      - { name: family, label: "Family (card label)", widget: string, required: false, hint: "Defaults to the last clade node" }
      - { name: specimenId, label: "Specimen (catalog no.)", widget: string, required: false, hint: "Verbatim, e.g. GPIT/RE/7288" }
      - { name: specimenName, label: "Specimen nickname", widget: string, required: false }
      - name: alsoKnownAs
        label: "Also known as"
        widget: list
        required: false
        field: { name: name, widget: string }
      - { name: lengthM, label: "Length (meters)", widget: number, required: false, value_type: float, hint: "Numeric; displays as m or cm automatically." }
      - { name: widthM, label: "Horizontal extent (meters)", widget: number, required: false, value_type: float, hint: "Only for a non-horizontal pose — raised neck, rearing or upright stance, pterosaur taking off. The nose-to-tail span measured HORIZONTALLY as drawn (usually less than Length; more for a takeoff pose). NOT the animal's girth. Leave blank for a normal horizontal pose and the scale comparisons just use Length. If you change Length, change this too — a stale value renders the animal at the wrong size beside others." }
      - { name: lengthLabel, label: "Length display override", widget: string, required: false, hint: "Replaces the displayed length TEXT only (e.g. a range); no effect on scaling." }
      - { name: massKg, label: "Body mass (kg)", widget: number, required: false, value_type: float, hint: "Numeric; displays as kg or tonnes automatically." }
      - { name: massSource, label: "Mass source", widget: string, required: false, hint: "e.g. PaleoGDI" }
      - { name: lifeStage, label: "Life stage", widget: string, required: false, hint: "e.g. Juvenile (adult proportions differ)" }
      - { name: sex, label: "Sex", widget: string, required: false, hint: "For sexually dimorphic taxa (mammals, pterosaurs) — e.g. Male, Female. Renders a record cell only when set; leave blank otherwise." }
      - { name: view, label: "View", widget: string, default: "Left lateral", required: false }
      - { name: basis, label: "Basis", widget: string, required: false }
      - { name: scaleBar, label: "Scale bar", widget: string, default: "1 meter", required: false, hint: "What the baked-in bar measures, spelled out — e.g. 1 meter, 50 centimeters" }
      - { name: drawingCredit, label: "Drawing credit (caption)", widget: string, default: "© Scott Hartman", required: false, hint: "Leave blank for the default © Scott Hartman" }
      # `license` and `creditText` are site-wide constants — provided by the schema defaults in
      # content.config.ts and intentionally NOT exposed here, so the CMS never writes them per entry.
      - name: reconstruction
        label: "Reconstruction image"
        widget: object
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
      - name: rigorous
        label: "Known-material image"
        widget: object
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
      - name: lifeReconstruction
        label: "Life reconstruction (color art)"
        widget: object
        required: false
        hint: "Optional color paleoart of the animal in life. Shows on the skeletal page below the reconstruction; the skeletal stays the primary image. Leave empty for taxa without one."
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
          - { name: caption, label: "Caption", widget: string, required: false }
      - name: additionalFigures
        label: "Additional figures (bonus)"
        widget: list
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
          - { name: caption, label: "Caption", widget: string, required: false }
      - { name: featured, label: "Featured", widget: boolean, default: false, required: false }
      - { name: growthSeries, label: "Growth-series overlay", widget: boolean, default: false, required: false, hint: "Tick to show an ontogenetic size overlay of the growth stages (add them as Additional figures, and supply matching silhouettes). Currently set up for Maiasaura." }
      - { name: underRevision, label: "Under revision (withhold the skeletal)", widget: boolean, default: false, required: false, hint: "Tick to show an 'under revision' notice + your placeholder (black silhouette) instead of presenting it as the current skeletal. Keeps the page, URL, and links; the image is dropped from SEO. Untick when the updated skeletal is ready." }
      - { name: added, label: "Date added", widget: datetime, required: false, hint: "Auto-filled to now when you create the entry — drives the home page's rotating 'newest reconstruction'. Leave it unless you're backdating older work." }
      - { name: body, label: "Description", widget: markdown, required: false, hint: "The prose shown beneath the record." }

  - name: specimens
    label: "Specimens — specimen pages"
    label_singular: "Specimen"
    folder: "src/content/specimens"
    create: true
    extension: md
    format: frontmatter
    identifier_field: catalog
    slug: "{{slug}}"
    summary: "{{catalog}}{{#if fields.nickname}} — {{nickname}}{{/if}}"
    fields:
      - { name: taxon, label: "Parent taxon (slug)", widget: string, hint: "The taxa entry id this belongs to, e.g. tyrannosaurus-rex" }
      - { name: catalog, label: "Catalog number", widget: string, hint: "Verbatim, e.g. FMNH PR 2081" }
      - { name: nickname, label: "Nickname", widget: string, required: false, hint: "e.g. Sue" }
      - { name: sex, label: "Sex", widget: string, required: false, hint: "For sexually dimorphic taxa — e.g. Male, Female. Renders only when set." }
      - { name: repository, label: "Repository", widget: string, required: false, hint: "Holding institution" }
      - { name: repositoryUrl, label: "Repository URL", widget: string, required: false, hint: "Links the repository name to the museum/collection page (opens in a new tab)" }
      - { name: formation, label: "Formation", widget: string, required: false }
      - { name: locality, label: "Locality", widget: string, required: false }
      - { name: lengthM, label: "Length (meters)", widget: number, required: false, value_type: float }
      - { name: widthM, label: "Horizontal extent (meters)", widget: number, required: false, value_type: float, hint: "Only for a non-horizontal pose. The nose-to-tail span measured HORIZONTALLY as drawn — not the animal's girth. Blank = use Length. Update it whenever you change Length." }
      - { name: femurM, label: "Femur length (meters)", widget: number, required: false, value_type: float }
      - { name: massKg, label: "Body mass (kg)", widget: number, required: false, value_type: float }
      - { name: completenessPct, label: "Completeness (%)", widget: number, required: false, value_type: int }
      - { name: collectedYear, label: "Collected (year)", widget: number, required: false, value_type: int }
      - { name: view, label: "View", widget: string, default: "Left lateral", required: false }
      - { name: basis, label: "Basis", widget: string, required: false }
      - { name: scaleBar, label: "Scale bar", widget: string, default: "1 meter", required: false, hint: "Spelled out — e.g. 1 meter, 50 centimeters" }
      - { name: drawingCredit, label: "Drawing credit (caption)", widget: string, default: "© Scott Hartman", required: false }
      - name: reconstruction
        label: "Reconstruction image"
        widget: object
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
      - name: rigorous
        label: "Known-material image"
        widget: object
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
      - name: additionalFigures
        label: "Additional figures (e.g. muscle reconstruction)"
        widget: list
        required: false
        fields:
          - { name: label, label: "Label (heading)", widget: string, required: false, hint: "e.g. Muscle reconstruction" }
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
          - { name: caption, label: "Caption", widget: string, required: false }
      - { name: overlay, label: "In scale-comparison overlay", widget: boolean, default: false, required: false, hint: "Curate ~3–6 for the scale figure" }
      - { name: featured, label: "Featured (show as a card)", widget: boolean, default: false, required: false }
      - { name: added, label: "Date added", widget: datetime, required: false, hint: "Auto-filled to now when you create the entry — drives the home page's rotating 'newest reconstruction'. Leave it unless you're backdating older work." }
      - { name: body, label: "Description", widget: markdown, required: false }

  - name: posts
    label: "Blog posts"
    label_singular: "Post"
    folder: "src/content/posts"
    # Blog photos go with the other 224 blog images, NOT in the skeletals folder
    # (that one feeds the silhouette tracer and the build's asset-sync).
    media_folder: "/public/images/blog"
    public_folder: "/images/blog"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [date, title]
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: date, label: "Date", widget: datetime, hint: "Publish date — sorts the blog and the home page's 'From the blog' section." }
      - { name: kind, label: "Category", widget: string, required: false, hint: "Small eyebrow label, e.g. Reconstruction notes, In the literature, You're doing it wrong" }
      - { name: excerpt, label: "Excerpt", widget: text, required: false, hint: "Teaser shown on the blog index and the home page." }
      - name: image
        label: "Lead image"
        widget: object
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
      - { name: featured, label: "Featured (home lead post)", widget: boolean, default: false, required: false }
      - { name: draft, label: "Draft (hide from the site)", widget: boolean, default: false, required: false }
      - { name: body, label: "Body", widget: markdown }

  - name: articles
    label: "Learn — guides & articles"
    label_singular: "Article"
    folder: "src/content/articles"
    # Article figures live apart from the skeletals: the silhouette tracer and the build's
    # asset-sync both key off public/images/skeletals, so only actual skeletals belong there.
    # A leading "/" makes these repo-root-relative rather than collection-relative.
    media_folder: "/public/images/articles"
    public_folder: "/images/articles"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [order, title, updated]
    fields:
      - { name: title, label: "Title", widget: string }
      - { name: kind, label: "Kind (eyebrow)", widget: string, required: false, hint: "Small label, e.g. Anatomy guide, Methodology, Tutorial" }
      - { name: summary, label: "Summary", widget: text, required: false, hint: "Teaser shown on the Learn hub." }
      - name: image
        label: "Lead image"
        widget: object
        required: false
        fields:
          - { name: src, label: "Image", widget: image }
          - { name: alt, label: "Alt text", widget: string }
      - { name: path, label: "URL override", widget: string, required: false, hint: "Leave blank for the normal /learn/<slug> URL. Set only to keep a legacy page at its existing URL (the anatomy guide uses /anatomy/)." }
      - { name: updated, label: "Last updated", widget: datetime, required: false, hint: "Evergreen content — when you last revised it (not a publish date)." }
      - { name: order, label: "Sort order", widget: number, required: false, value_type: int, hint: "Lower sorts first on the hub. Leave blank to sort by title." }
      - name: downloads
        label: "Downloads (classroom handout / deck)"
        widget: list
        required: false
        hint: "Upload a branded PDF and/or PowerPoint. They show up as a 'Want to use this in your classroom?' block at the foot of the article."
        fields:
          - { name: format, label: "Format", widget: select, options: ["pdf", "pptx"] }
          # `file`, NOT `string`: as a plain text box there was no way to UPLOAD anything — you could
          # only type a path, so the first real use recorded a local `G:\My Drive\...` path and the
          # buttons rendered as dead links. The media_folder override sends these to public/downloads/
          # rather than the collection default (public/images/articles), which is for figures.
          - { name: src, label: "File", widget: file, media_folder: "/public/downloads", public_folder: "/downloads", hint: "Upload the PDF or PowerPoint itself — don't type a path." }
          - { name: label, label: "Button label", widget: string, required: false }
          - { name: note, label: "Note", widget: string, required: false, hint: "e.g. 12 MB · 18 slides" }
      - { name: licenseNote, label: "Use grant (shown with downloads)", widget: text, required: false, hint: "The terms under which classrooms may use the download. Leave blank for the default educational-use line." }
      - { name: featured, label: "Featured (flagship card)", widget: boolean, default: false, required: false }
      - { name: draft, label: "Draft (hide from the site)", widget: boolean, default: false, required: false }
      - { name: body, label: "Body", widget: markdown }

  - name: resources
    label: "Learn — external resources"
    label_singular: "Resource"
    folder: "src/content/resources"
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: "{{slug}}"
    summary: "{{title}}"
    sortable_fields: [order, title, category]
    fields:
      - { name: title, label: "Name", widget: string, hint: "The place, person, or site." }
      - { name: url, label: "URL", widget: string, hint: "The outbound link (opens in a new tab)." }
      - { name: category, label: "Category", widget: select, options: ["museum", "artist", "blog", "reference"], default: "museum" }
      - { name: region, label: "Region (museums)", widget: string, required: false, hint: "Groups museums on the hub, e.g. North America, Europe. Ignored for other categories." }
      - { name: blurb, label: "Your take (annotation)", widget: text, hint: "One line in your voice on why it's worth visiting/reading. This is the point — a bare link adds nothing." }
      - { name: order, label: "Sort order", widget: number, required: false, value_type: int, hint: "Lower sorts first within its group." }
      - { name: featured, label: "Featured", widget: boolean, default: false, required: false }
      - { name: draft, label: "Draft (hide from the site)", widget: boolean, default: false, required: false }

  - name: comments
    label: "Comments — moderation"
    label_singular: "Comment"
    folder: "src/content/comments"
    # Readers submit comments through the site; the archive importer seeds the old ones.
    # You don't author here — you MODERATE: flip Approved on, or delete a bad one.
    create: false
    delete: true
    extension: md
    format: frontmatter        # YAML frontmatter + a body; the `body` field below maps to the comment text
    identifier_field: author
    sortable_fields: [date, post, approved]
    summary: "{{#if fields.approved}}✓{{else}}⏳ PENDING{{/if}} — {{author}} on {{fields.post}}"
    fields:
      - { name: post, label: "Post slug", widget: string }
      - { name: author, label: "Name", widget: string }
      - { name: date, label: "Date", widget: datetime }
      - { name: approved, label: "Approved — visible on the site", widget: boolean, default: false, hint: "Flip on to publish (a build then renders it). This is the moderation gate." }
      - { name: parent, label: "In reply to (comment id)", widget: string, required: false }
      - { name: website, label: "Link", widget: string, required: false }
      - { name: source, label: "Source", widget: select, options: ["site", "disqus"], default: "site" }
      - { name: body, label: "Comment text", widget: text }

  - name: publications
    label: "Publications — your papers"
    label_singular: "Publication"
    folder: "src/content/publications"
    # Your OWN authored works, shown on About → Research. (The 'where my work appears' credits list —
    # others' books/papers that reproduce your art — is separate.)
    create: true
    extension: md
    format: frontmatter
    identifier_field: title
    slug: "{{year}}-{{slug}}"
    summary: "{{year}} — {{title}}"
    sortable_fields: [year, title]
    fields:
      - { name: authors, label: "Authors", widget: string, hint: "Full author list as it should read, e.g. Lovelace, D. M., Hartman, S. A., & Porter, W. P." }
      - { name: year, label: "Year", widget: number, value_type: int }
      - { name: title, label: "Title", widget: string }
      - { name: venue, label: "Journal / venue", widget: string, required: false, hint: "e.g. PLOS ONE, Nature Communications, or the book/publisher" }
      - { name: doi, label: "DOI", widget: string, required: false, hint: "Bare DOI only, e.g. 10.1371/journal.pone.0223872 — rendered as a doi.org link." }
      - { name: url, label: "Link (if no DOI)", widget: string, required: false }
      - { name: kind, label: "Kind", widget: select, options: ["paper", "book", "chapter"], default: "paper", required: false }
      - { name: note, label: "Note", widget: string, required: false, hint: "e.g. Skeletal diagrams by S. Hartman (for a contributed volume)." }
      - { name: featured, label: "Featured", widget: boolean, default: false, required: false }
      - { name: order, label: "Sort order override", widget: number, required: false, value_type: int, hint: "Lower sorts first. Leave blank to sort by year, newest first." }
      - { name: draft, label: "Draft (hide from the site)", widget: boolean, default: false, required: false }
